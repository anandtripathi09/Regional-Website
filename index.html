<!DOCTYPE html>
<html>
<head>
<title>Language Detection</title>
</head>

<body>

<h1 id="title">Loading...</h1>

<script>

function loadLanguage(lang){

if(lang==="marathi"){
document.getElementById("title").innerText="स्वागत आहे";
}
else if(lang==="hindi"){
document.getElementById("title").innerText="स्वागत है";
}
else if(lang==="gujarati"){
document.getElementById("title").innerText="સ્વાગત છે";
}
else if(lang==="tamil"){
document.getElementById("title").innerText="வரவேற்கிறோம்";
}
else{
document.getElementById("title").innerText="Welcome";
}

}

function browserFallback(){

let lang=navigator.language || "";

if(lang.includes("mr")) loadLanguage("marathi");
else if(lang.includes("hi")) loadLanguage("hindi");
else if(lang.includes("gu")) loadLanguage("gujarati");
else if(lang.includes("ta")) loadLanguage("tamil");
else loadLanguage("english");

}

function detectIP(){

fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(data=>{

let state=data.region;

if(state==="Maharashtra") loadLanguage("marathi");
else if(state==="Rajasthan") loadLanguage("hindi");
else if(state==="Gujarat") loadLanguage("gujarati");
else if(state==="Tamil Nadu") loadLanguage("tamil");
else browserFallback();

})
.catch(browserFallback);

}

function detectGPS(){

if(!navigator.geolocation){
detectIP();
return;
}

navigator.geolocation.getCurrentPosition(

function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(r=>r.json())
.then(data=>{

let state=data.address.state;

if(state==="Maharashtra") loadLanguage("marathi");
else if(state==="Rajasthan") loadLanguage("hindi");
else if(state==="Gujarat") loadLanguage("gujarati");
else if(state==="Tamil Nadu") loadLanguage("tamil");
else browserFallback();

})
.catch(detectIP);

},

function(){
detectIP();
}

);

}

detectGPS();

</script>

</body>
</html>
