<!DOCTYPE html>
<html>
<head>
<title>Regional Language Detection Demo</title>
<meta charset="UTF-8">
<style>
body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:100px;
}
</style>
</head>

<body>

<h1 id="title">Ruk Bhai</h1>
<p id="desc">Please wait while we detect your region.</p>

<script>


function loadLanguage(lang){

const content = {
english : {
title : "Welcome",
desc : "Website loaded in English"
},

hindi : {
title : "स्वागत है",
desc : "यह वेबसाइट हिंदी भाषा में है"
},

marathi : {
title : "स्वागत आहे",
desc : "ही वेबसाइट मराठी भाषेत आहे"
},

gujarati : {
title : "સ્વાગત છે",
desc : "આ વેબસાઇટ ગુજરાતી ભાષામાં છે"
},

tamil : {
title : "வரவேற்கிறோம்",
desc : "இந்த இணையதளம் தமிழ் மொழியில் உள்ளது"
}

}

const selected = content[lang] || content.english

document.getElementById("title").innerText = selected.title
document.getElementById("desc").innerText = selected.desc

}



function detectBrowserLanguage(){

const lang = navigator.language || ""

if(lang.includes("mr")) return "marathi"
if(lang.includes("hi")) return "hindi"
if(lang.includes("gu")) return "gujarati"
if(lang.includes("ta")) return "tamil"

return "english"

}



function detectIPLocation(){

fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {

const state = data.region

if(state === "Maharashtra") loadLanguage("marathi")
else if(state === "Rajasthan") loadLanguage("hindi")
else if(state === "Gujarat") loadLanguage("gujarati")
else if(state === "Tamil Nadu") loadLanguage("tamil")
else loadLanguage(detectBrowserLanguage())

})
.catch(() => {

loadLanguage(detectBrowserLanguage())

})

}



function detectGPSLocation(){

if(!navigator.geolocation){
detectIPLocation()
return
}

navigator.geolocation.getCurrentPosition(

function(position){

const lat = position.coords.latitude
const lon = position.coords.longitude

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(res => res.json())
.then(data => {

const state = data.address.state

if(state === "Maharashtra") loadLanguage("marathi")
else if(state === "Rajasthan") loadLanguage("hindi")
else if(state === "Gujarat") loadLanguage("gujarati")
else if(state === "Tamil Nadu") loadLanguage("tamil")
else loadLanguage(detectBrowserLanguage())

})
.catch(() => {

detectIPLocation()

})

},

function(){

detectIPLocation()

})

}


detectGPSLocation()

</script>

</body>
</html>
